<div class="dashboard-wrapper">
  <!-- Patient Header -->
  <div class="patient-header" *ngIf="patient; else noPatient">
    <div class="patient-details">
      <h2>{{ getFullName() }}</h2>
      <div class="patient-info">
        <span class="info-item">
          <strong>MRN:</strong> {{ getMRN() }}
        </span>
        <span class="info-item">
          <strong>DOB:</strong> {{ getDOB() }}
        </span>
        <span class="info-item">
          <strong>Age:</strong> {{ getPatientAge() }}
        </span>
        <span class="info-item">
          <strong>Gender:</strong> {{ getPatientGender() }}
        </span>
      </div>
    </div>
  </div>

  <ng-template #noPatient>
    <div class="alert alert-warning">
      No patient selected. Please use the search function to select a patient.
    </div>
  </ng-template>

  <!-- Module Navigation Tabs -->
  <div class="module-tabs" *ngIf="patient && availableModules.length > 0">
    <button 
      *ngFor="let module of availableModules"
      class="tab-button"
      [class.active]="selectedModule === module.name.toLowerCase()"
      (click)="navigateToModule(module.name.toLowerCase())">
      <span class="tab-icon">{{ module.icon }}</span>
      <span class="tab-label">{{ module.name }}</span>
    </button>
  </div>

  <!-- Module Content (loaded via router) -->
  <div class="module-content">
    <router-outlet></router-outlet>
  </div>
</div>
