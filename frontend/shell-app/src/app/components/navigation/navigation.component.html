<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <h1>Patient Records</h1>
    </div>

    <div class="navbar-center">
      <div class="patient-control">
        <div class="search-container" [class.visible]="searchVisible">
          <app-patient-search #patientSearchRef (click)="$event.stopPropagation()"></app-patient-search>
        </div>
      </div>
    </div>

    <div class="navbar-right">
      <div class="user-info">
        <span class="username">{{ currentUsername }}</span>
        <span class="role" [ngClass]="'role-' + (currentRole || 'unknown')">
          {{ currentRole }}
        </span>
      </div>
      <a class="logout-link" (click)="onLogout()">Logout</a>
    </div>
  </div>
</nav>
