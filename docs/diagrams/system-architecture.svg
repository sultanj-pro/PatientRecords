      .admin     { fill: #FCE4EC; stroke: #C62828; stroke-width: 2; }
      .module    { fill: #F3E5F5; stroke: #7B1FA2; stroke-width: 2; }
      .react-mod { fill: #E8EAF6; stroke: #283593; stroke-width: 2; }
