      .service   { fill: #E8F5E9; stroke: #388E3C; stroke-width: 2; }
      .reg-svc   { fill: #E3F2FD; stroke: #1976D2; stroke-width: 2; }
      .database  { fill: #FFE0B2; stroke: #E65100; stroke-width: 2; }
