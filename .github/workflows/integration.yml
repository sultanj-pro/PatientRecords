name: Integration Compose Test

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start compose stack
        env:
          PR_DB_HOST: ${{ secrets.PR_DB_HOST }}
          PR_DB_NAME: ${{ secrets.PR_DB_NAME }}
          PR_DB_USER: ${{ secrets.PR_DB_USER }}
          PR_DB_PASSWORD: ${{ secrets.PR_DB_PASSWORD }}
          JDBC_URL: postgres://${{ secrets.PR_DB_USER }}:${{ secrets.PR_DB_PASSWORD }}@${{ secrets.PR_DB_HOST }}:5432/${{ secrets.PR_DB_NAME }}
          JDBC_USER: ${{ secrets.PR_DB_USER }}
          JDBC_PASSWORD: ${{ secrets.PR_DB_PASSWORD }}
        run: |
          echo "Starting compose stack (secrets injected via step env)"
          docker compose -f docker-compose.yml -f docker-compose.override.postgres.yml up -d --build

      - name: Run DB migrations (node-pg-migrate)
        env:
          PR_DB_HOST: ${{ secrets.PR_DB_HOST }}
          PR_DB_NAME: ${{ secrets.PR_DB_NAME }}
          PR_DB_USER: ${{ secrets.PR_DB_USER }}
          PR_DB_PASSWORD: ${{ secrets.PR_DB_PASSWORD }}
        run: |
          echo "Running migrations inside pr-backend container"
          # Retry loop to ensure the backend container is ready to accept commands
          for i in {1..30}; do
            if docker compose exec -T pr-backend true >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker compose exec -T pr-backend sh -c "DATABASE_URL=postgres://${PR_DB_USER}:${PR_DB_PASSWORD}@${PR_DB_HOST}:5432/${PR_DB_NAME} npm run migrate"

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:3001/health >/dev/null 2>&1; then
              echo Backend healthy
              break
            fi
            sleep 2
          done

      - name: Wait for spark-service health
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8998/health >/dev/null 2>&1; then
              echo Spark-service healthy
              break
            fi
            sleep 2
          done

      - name: Run provider integration test
        run: |
          docker compose exec -T spark-service npm run integration:provider-test

      - name: Backend API smoke checks
        run: |
          echo "Running backend API smoke checks"
          TOKEN=$(curl -s -X POST -H "Content-Type: application/json" -d '{"username":"doc1","password":"x"}' http://localhost:3001/auth/login | python -c "import sys,json;print(json.load(sys.stdin).get('accessToken',''))")
          if [ -z "$TOKEN" ]; then echo "Failed to obtain access token"; cat /proc/1/fd/1 || true; exit 1; fi
          echo "Token obtained"
          curl -sSf -H "Authorization: Bearer $TOKEN" "http://localhost:3001/api/patients" >/dev/null
          echo "/api/patients OK"
          curl -sSf -H "Authorization: Bearer $TOKEN" "http://localhost:3001/api/patients/1" >/dev/null
          echo "/api/patients/1 OK"
          curl -sSf -H "Authorization: Bearer $TOKEN" "http://localhost:3001/api/patients/1/vitals" >/dev/null
          echo "/api/patients/1/vitals OK"

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.postgres.yml down -v
