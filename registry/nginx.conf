server {
    listen 5000;
    server_name _;
    
    location / {
        root /usr/share/nginx/html;
        add_header Content-Type application/json;
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
        try_files $uri $uri/ =404;
    }
}
