services:
  # Shell App (Host) - Orchestrator
  patientrecord-shell:
    build:
      context: ./frontend
      dockerfile: shell-app/Dockerfile
    image: patientrecord-shell
    container_name: patientrecord-shell
    ports:
      - "4200:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  # Demographics Micro-Frontend (Independent Container)
  patientrecord-demographics:
    build:
      context: ./frontend
      dockerfile: modules/demographics/Dockerfile
    image: patientrecord-demographics
    container_name: patientrecord-demographics
    ports:
      - "4201:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  # Vitals Micro-Frontend (Independent Container)
  patientrecord-vitals:
    build:
      context: ./frontend
      dockerfile: modules/vitals/Dockerfile
    image: patientrecord-vitals
    container_name: patientrecord-vitals
    ports:
      - "4202:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  # Labs Micro-Frontend (Independent Container)
  patientrecord-labs:
    build:
      context: ./frontend
      dockerfile: modules/labs/Dockerfile
    image: patientrecord-labs
    container_name: patientrecord-labs
    ports:
      - "4203:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  # Medications Micro-Frontend (Independent Container)
  patientrecord-medications:
    build:
      context: ./frontend
      dockerfile: modules/medications/Dockerfile
    image: patientrecord-medications
    container_name: patientrecord-medications
    ports:
      - "4204:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  # Visits Micro-Frontend (Independent Container)
  patientrecord-visits:
    build:
      context: ./frontend
      dockerfile: modules/visits/Dockerfile
    image: patientrecord-visits
    container_name: patientrecord-visits
    ports:
      - "4205:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  # Care Team Micro-Frontend (Independent Container)
  patientrecord-care-team:
    build:
      context: ./frontend
      dockerfile: modules/care-team/Dockerfile
    image: patientrecord-care-team
    container_name: patientrecord-care-team
    ports:
      - "4206:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  patientrecord-procedures:
    build:
      context: ./frontend/modules/procedures-react
      dockerfile: Dockerfile
    image: patientrecord-procedures
    container_name: patientrecord-procedures
    ports:
      - "4207:4200"
    depends_on:
      patientrecord-api-gateway:
        condition: service_started
    networks:
      - patientrecords

  patientrecord-api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    image: patientrecord-api-gateway
    container_name: patientrecord-api-gateway
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://patientrecord-auth-service:5001
      - PATIENT_SERVICE_URL=http://patientrecord-patient-service:5002
      - REGISTRY_SERVICE_URL=http://patientrecord-registry-service:5100
      - VITALS_SERVICE_URL=http://patientrecord-vitals-service:5003
      - LABS_SERVICE_URL=http://patientrecord-labs-service:5004
      - MEDICATIONS_SERVICE_URL=http://patientrecord-medications-service:5005
      - VISITS_SERVICE_URL=http://patientrecord-visits-service:5006
      - CARE_TEAM_SERVICE_URL=http://patientrecord-care-team-service:5007
    ports:
      - "5000:5000"
    depends_on:
      patientrecord-auth-service:
        condition: service_started
      patientrecord-patient-service:
        condition: service_started
      patientrecord-registry-service:
        condition: service_started
      patientrecord-vitals-service:
        condition: service_started
      patientrecord-labs-service:
        condition: service_started
      patientrecord-medications-service:
        condition: service_started
      patientrecord-visits-service:
        condition: service_started
      patientrecord-care-team-service:
        condition: service_started
    networks:
      - patientrecords

  patientrecord-auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    image: patientrecord-auth-service
    container_name: patientrecord-auth-service
    environment:
      - PORT=5001
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - TOKEN_EXPIRATION_MINUTES=${TOKEN_EXPIRATION_MINUTES:-60}
    ports:
      - "5001:5001"
    networks:
      - patientrecords

  patientrecord-patient-service:
    build:
      context: ./backend/services/patient-service
      dockerfile: Dockerfile
    image: patientrecord-patient-service
    container_name: patientrecord-patient-service
    environment:
      - PORT=5002
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MONGODB_URI=mongodb://admin:admin@patientrecord-mongodb:27017/patientrecords?authSource=admin
    ports:
      - "5002:5002"
    depends_on:
      patientrecord-mongodb:
        condition: service_healthy
    networks:
      - patientrecords

  patientrecord-vitals-service:
    build:
      context: ./backend/services/vitals-service
      dockerfile: Dockerfile
    image: patientrecord-vitals-service
    container_name: patientrecord-vitals-service
    environment:
      - PORT=5003
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MONGODB_URI=mongodb://admin:admin@patientrecord-mongodb:27017/patientrecords?authSource=admin
    ports:
      - "5003:5003"
    depends_on:
      patientrecord-mongodb:
        condition: service_healthy
    networks:
      - patientrecords

  patientrecord-labs-service:
    build:
      context: ./backend/services/labs-service
      dockerfile: Dockerfile
    image: patientrecord-labs-service
    container_name: patientrecord-labs-service
    environment:
      - PORT=5004
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MONGODB_URI=mongodb://admin:admin@patientrecord-mongodb:27017/patientrecords?authSource=admin
    ports:
      - "5004:5004"
    depends_on:
      patientrecord-mongodb:
        condition: service_healthy
    networks:
      - patientrecords

  patientrecord-medications-service:
    build:
      context: ./backend/services/medications-service
      dockerfile: Dockerfile
    image: patientrecord-medications-service
    container_name: patientrecord-medications-service
    environment:
      - PORT=5005
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MONGODB_URI=mongodb://admin:admin@patientrecord-mongodb:27017/patientrecords?authSource=admin
    ports:
      - "5005:5005"
    depends_on:
      patientrecord-mongodb:
        condition: service_healthy
    networks:
      - patientrecords

  patientrecord-visits-service:
    build:
      context: ./backend/services/visits-service
      dockerfile: Dockerfile
    image: patientrecord-visits-service
    container_name: patientrecord-visits-service
    environment:
      - PORT=5006
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MONGODB_URI=mongodb://admin:admin@patientrecord-mongodb:27017/patientrecords?authSource=admin
    ports:
      - "5006:5006"
    depends_on:
      patientrecord-mongodb:
        condition: service_healthy
    networks:
      - patientrecords

  patientrecord-care-team-service:
    build:
      context: ./backend/services/care-team-service
      dockerfile: Dockerfile
    image: patientrecord-care-team-service
    container_name: patientrecord-care-team-service
    environment:
      - PORT=5007
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MONGODB_URI=mongodb://admin:admin@patientrecord-mongodb:27017/patientrecords?authSource=admin
    ports:
      - "5007:5007"
    depends_on:
      patientrecord-mongodb:
        condition: service_healthy
    networks:
      - patientrecords

  patientrecord-registry-service:
    build:
      context: ./backend/services/registry-service
      dockerfile: Dockerfile
    image: patientrecord-registry-service
    container_name: patientrecord-registry-service
    environment:
      - PORT=5100
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - MONGODB_URI=mongodb://admin:admin@patientrecord-mongodb:27017/patientrecords?authSource=admin
    ports:
      - "5100:5100"
    depends_on:
      patientrecord-mongodb:
        condition: service_healthy
    networks:
      - patientrecords

  patientrecord-mongodb:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    image: patientrecord-mongodb
    container_name: patientrecord-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "admin", "-p", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patientrecords

volumes:
  mongo_data:
    driver: local

networks:
  patientrecords:
    driver: bridge
