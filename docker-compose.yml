services:
  pr-frontend:
    build: ./frontend
    container_name: patientrecords-frontend
    ports:
      - "8081:80"
    networks:
      - app-net
  pr-backend:
    build: ./backend
    container_name: patientrecords-backend
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=clonet-postgresql
      - DB_PORT=5432
      - DB_NAME=patientrecords
      - DB_USER=pr_user
      - DB_PASSWORD=pr_pass
    ports:
      - "3001:3001"
    volumes:
      - ../POC-ccnc/data:/data:ro
      - ../migrations:/migrations:ro
    networks:
      - app-net
  minio:
    image: minio/minio:latest
    container_name: patientrecords-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
  spark-service:
    build: ./spark-service
    container_name: patientrecords-spark-service
    ports:
      - "8998:8998"
    environment:
      - STORAGE_PROVIDER=delta-minio
      - PORT=8998
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      - minio
    networks:
      - app-net
networks:
  app-net:
    driver: bridge

volumes:
  minio_data:
    driver: local
